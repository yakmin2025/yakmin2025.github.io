<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로또 추천</title>

<style>
  body {
    font-family: "Pretendard", sans-serif;
    text-align: center;
    background: #fff9f6;
    color: #333;
    margin: 0;
    padding: 0;
  }

  .guide {
    max-width: 480px;
    margin: 25px auto 35px;
    background: #ffffff;
    border-radius: 12px;
    padding: 16px 20px;
    font-size: 0.95em;
    color: #555;
    line-height: 1.7;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    text-align: left;
  }

  .step { margin: 4px 0; }
  .step.one { white-space: nowrap; }

  .food-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin: 20px auto;
    max-width: 480px;
  }

  .food-btn {
    font-size: 1.8em;
    border: none;
    border-radius: 50%;
    margin: 10px;
    width: 70px;
    height: 70px;
    background: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    cursor: pointer;
  }

  .numbers {
    margin: 30px auto;
    display: flex;
    background: #fff;
    padding: 20px 30px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    min-height: 100px;
    width: fit-content;
    justify-content: center;
    align-items: center;
    gap: 12px;
    overflow-x: auto;
  }

  .ball {
    display: inline-block;
    width: 46px;
    height: 46px;
    line-height: 46px;
    border-radius: 50%;
    color: white;
    font-weight: bold;
    font-size: 1.1em;
  }

  .actions { margin: 10px; }

  button.action-btn {
    background: #ffdca8;
    border: none;
    border-radius: 25px;
    padding: 10px 18px;
    font-size: 1em;
    margin: 5px;
    cursor: pointer;
  }

  .history {
    margin: 20px auto 40px;
    max-width: 480px;
    text-align: left;
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }
</style>
</head>

<body>

<div class="guide">
  🍽 <b>사용 방법</b><br><br>
  <div class="step one">1️⃣ 오늘 먹은 음식 클릭</div>
  <div class="step">2️⃣ AI가 로또 번호 추천</div>
  <div class="step">3️⃣ 매일마다 번호 자동 업데이트</div>
</div>

<div class="food-container">
  <button class="food-btn">🍣</button>
  <button class="food-btn">🍕</button>
  <button class="food-btn">🍗</button>
  <button class="food-btn">🍔</button>
  <button class="food-btn">🍙</button>
  <button class="food-btn">🍜</button>
  <button class="food-btn">🍲</button>
  <button class="food-btn">🥓</button>
  <button class="food-btn">🥩</button>
</div>

<div id="numbers" class="numbers">
  <div>🎯 음식 선택 시 번호가 표시됩니다</div>
</div>

<div class="actions" id="actions" style="display:none;">
  <button class="action-btn" onclick="saveLotto()">오늘의 번호 저장하기</button>
</div>

<div class="history">
  <h3>📜 오늘의 번호</h3>
  <ul id="historyList"></ul>
</div>

<script>
const foods = ["초밥","피자","치킨","햄버거","김밥","라면","국밥","삼겹살","스테이크"];
const colors = ["#f44336","#ff9800","#ffeb3b","#4caf50","#2196f3","#9c27b0"];
let selectedFood = null;

// 🔥 앱 광고 연결 + 클릭 안정화
document.querySelectorAll(".food-btn").forEach((btn, index) => {
  btn.onclick = function() {
    selectedFood = foods[index];

    try {
      if (typeof Android !== "undefined") {
        Android.foodClicked();
      }
    } catch(e) {}

    generateNumbers(selectedFood);
  };
});

function generateNumbers(food) {
  const today = new Date().toISOString().slice(0,10);
  const seed = food + today;
  const numbers = [];
  let hash = 0;

  for (let i = 0; i < seed.length; i++) {
    hash = seed.charCodeAt(i) + ((hash << 5) - hash);
    hash = Math.abs(hash);
  }

  while (numbers.length < 6) {
    hash = (hash * 9301 + 49297) % 233280;
    const num = Math.floor((hash / 233280) * 45) + 1;
    if (!numbers.includes(num)) numbers.push(num);
  }

  displayNumbers(numbers);
}

function displayNumbers(nums) {
  const container = document.getElementById("numbers");
  container.innerHTML = "";

  nums.forEach((n, i) => {
    const ball = document.createElement("div");
    ball.className = "ball";
    ball.style.background = colors[i % colors.length];
    ball.innerText = n;
    container.appendChild(ball);
  });

  document.getElementById("actions").style.display = "block";
}

// 🔥 저장 (완전 안정 버전)
function saveLotto() {
  try {
    if (!selectedFood) {
      alert("음식을 먼저 선택하세요!");
      return;
    }

    const balls = document.getElementsByClassName("ball");

    if (balls.length === 0) {
      alert("번호가 없습니다!");
      return;
    }

    let nums = [];
    for (let i = 0; i < balls.length; i++) {
      nums.push(balls[i].innerText);
    }

    const today = new Date().toISOString().slice(0,10);
    const record = today + " / " + selectedFood + " / " + nums.join(",");

    let history = JSON.parse(localStorage.getItem("lottoHistory") || "[]");
    history.push(record);

    localStorage.setItem("lottoHistory", JSON.stringify(history));

    renderHistory();

    alert("저장 완료!");
  } catch(e) {
    alert("에러 발생: " + e.message);
  }
}

function renderHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  const history = JSON.parse(localStorage.getItem("lottoHistory") || "[]");

  for (let i = history.length - 1; i >= 0; i--) {
    const li = document.createElement("li");
    li.innerText = history[i];
    list.appendChild(li);
  }
}

// 🔥 앱에서 localStorage 문제 대비
try {
  renderHistory();
} catch(e) {}
</script>

</body>
</html>
