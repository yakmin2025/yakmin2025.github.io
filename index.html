<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 추천</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin: 0;
    padding: 20px;
    background: #f5f5f5;
}

.how-to-use {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

.food-btn {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
}

.lotto-box {
    margin-top: 20px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
}

.ball {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: orange;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="how-to-use">
    <p>1. 오늘 먹은 음식 클릭</p>
    <p>2. AI가 로또 번호 추천</p>
    <p>3. 매일마다 번호 자동 업데이트</p>
</div>

<!-- 음식 버튼 -->
<div>
    <button class="food-btn" onclick="selectFood('치킨')">치킨</button>
    <button class="food-btn" onclick="selectFood('피자')">피자</button>
    <button class="food-btn" onclick="selectFood('햄버거')">햄버거</button>
    <button class="food-btn" onclick="selectFood('짜장면')">짜장면</button>
    <button class="food-btn" onclick="selectFood('삼겹살')">삼겹살</button>
</div>

<!-- 로또 번호 -->
<div id="lotto" class="lotto-box"></div>

<!-- 저장 버튼 -->
<button onclick="saveToday()" style="margin-top:15px; padding:10px 15px; border:none; border-radius:8px; background:#ff9800; color:white;">
오늘의 번호 저장하기
</button>

<!-- 저장된 결과 -->
<div id="savedArea" style="margin-top:20px; background:white; padding:15px; border-radius:10px;">
    <div id="savedContent"></div>
</div>

<script>

let currentNumbers = [];
let currentFood = "";

// 음식 클릭
function selectFood(food){

    currentFood = food;

    if (typeof Android !== "undefined") {
        Android.foodClicked();
    }

    generateLotto();
}

// 번호 생성
function generateLotto(){

    let numbers = [];

    while(numbers.length < 6){
        let num = Math.floor(Math.random() * 45) + 1;
        if(!numbers.includes(num)){
            numbers.push(num);
        }
    }

    numbers.sort((a,b) => a-b);

    currentNumbers = numbers;

    showNumbers(numbers);
}

// 번호 표시
function showNumbers(numbers){

    let lottoDiv = document.getElementById("lotto");
    lottoDiv.innerHTML = "";

    numbers.forEach(n => {
        let ball = document.createElement("div");
        ball.className = "ball";
        ball.innerText = n;
        lottoDiv.appendChild(ball);
    });
}

// 저장 버튼
function saveToday(){

    if(currentNumbers.length === 0){
        alert("먼저 음식을 선택하세요!");
        return;
    }

    let d = new Date();
    let today = d.getFullYear() + "-" +
        String(d.getMonth()+1).padStart(2,'0') + "-" +
        String(d.getDate()).padStart(2,'0');

    let data = {
        date: today,
        food: currentFood,
        numbers: currentNumbers
    };

    localStorage.setItem("savedLotto", JSON.stringify(data));

    showSaved();
}

// 저장된 결과 표시 (한 줄)
function showSaved(){

    let saved = localStorage.getItem("savedLotto");

    if(!saved) return;

    let data = JSON.parse(saved);

    let html = `
        <p style="font-weight:bold; font-size:16px;">
        ${data.date} / ${data.food} / ${data.numbers.join(",")}
        </p>
    `;

    document.getElementById("savedContent").innerHTML = html;
}

// 실행 시 저장된 값 불러오기
window.onload = function(){
    showSaved();
}

</script>

</body>
</html>
